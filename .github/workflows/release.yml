name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller fastapi uvicorn

      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          pyinstaller \
            --onefile \
            --name "raphaeld-${{ matrix.triple }}" \
            --distpath desktop/src-tauri/binaries \
            --add-data "$(pwd)/config/settings.yaml:config" \
            --hidden-import=core --hidden-import=tools --hidden-import=interfaces \
            --hidden-import=uvicorn.lifespan.on \
            --hidden-import=uvicorn.lifespan.off \
            --hidden-import=uvicorn.protocols.http.h11_impl \
            --collect-submodules core --collect-submodules tools \
            interfaces/daemon.py

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/binaries
          pyinstaller `
            --onefile `
            --name "raphaeld-${{ matrix.triple }}" `
            --distpath desktop/src-tauri/binaries `
            --add-data "${PWD}/config/settings.yaml;config" `
            --hidden-import=core --hidden-import=tools --hidden-import=interfaces `
            --hidden-import=uvicorn.lifespan.on `
            --hidden-import=uvicorn.lifespan.off `
            --hidden-import=uvicorn.protocols.http.h11_impl `
            --collect-submodules core --collect-submodules tools `
            interfaces/daemon.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Frontend deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile=false

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Raphael ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.os == 'macos-14' && '--target aarch64-apple-darwin' || '' }}

  publish-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate latest.json for updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          NOTES="See https://github.com/${REPO}/releases/tag/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Fetch release asset list
          gh release view "${TAG}" --json assets --jq '.assets[].name' > /tmp/assets.txt
          cat /tmp/assets.txt

          # Helper to get a signature from a .sig file attached to the release.
          get_sig() {
            local sig_name="$1"
            if grep -qFx "${sig_name}" /tmp/assets.txt; then
              gh release download "${TAG}" --pattern "${sig_name}" -O -
            fi
          }

          # Darwin aarch64: Raphael_aarch64.app.tar.gz + its .sig (generated by tauri-action)
          DARWIN_TAR="Raphael_aarch64.app.tar.gz"
          DARWIN_SIG=""
          if grep -qFx "${DARWIN_TAR}" /tmp/assets.txt; then
            DARWIN_SIG="$(get_sig "${DARWIN_TAR}.sig" || true)"
          fi

          # Windows x64 — prefer NSIS .exe (auto-update friendly), fallback to MSI
          # Tauri v2 attaches .sig directly to installer artifacts; we may also see
          # .nsis.zip / .msi.zip updater bundles depending on config
          WIN_URL=""
          WIN_SIG=""
          for cand in \
            "Raphael_${VERSION}_x64-setup.nsis.zip" \
            "Raphael_${VERSION}_x64_en-US.msi.zip" \
            "Raphael_${VERSION}_x64-setup.exe" \
            "Raphael_${VERSION}_x64_en-US.msi"; do
            if grep -qFx "${cand}" /tmp/assets.txt && grep -qFx "${cand}.sig" /tmp/assets.txt; then
              WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${cand}"
              WIN_SIG="$(get_sig "${cand}.sig" || true)"
              echo "selected windows artifact: ${cand}"
              break
            fi
          done

          DARWIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${DARWIN_TAR}"

          python3 - <<PY
          import json, os
          platforms = {}
          darwin_sig = """${DARWIN_SIG}""".strip()
          win_sig = """${WIN_SIG}""".strip()
          if darwin_sig:
              platforms["darwin-aarch64"] = {
                  "signature": darwin_sig,
                  "url": "${DARWIN_URL}",
              }
          if win_sig and "${WIN_URL}":
              platforms["windows-x86_64"] = {
                  "signature": win_sig,
                  "url": "${WIN_URL}",
              }
          manifest = {
              "version": "${VERSION}",
              "notes": "${NOTES}",
              "pub_date": "${PUB_DATE}",
              "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          PY

          gh release upload "${TAG}" latest.json --clobber

      - name: Promote draft release to published (latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # tauri-action 이 releaseDraft: true 로 만든 Draft 를 여기서 승격.
          # updater 엔드포인트(/releases/latest/...)는 Draft 를 건너뛰므로
          # Publish + --latest 플래그까지 걸어야 자동 업데이트가 동작.
          gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
